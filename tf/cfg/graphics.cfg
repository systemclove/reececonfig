// reece's config //
// graphics settings

// --- Core rendering ---
mat_dxlevel 98              // Highest DirectX level (requires relaunch first time you set it)
mat_queue_mode -1           // Let engine pick best threading mode
mat_vsync 0                 // Disable vsync (set to 1 if you get screen tearing)
mat_triplebuffered 1        // Smoother frame delivery

// --- Level of detail / model quality ---
r_lod -1                    // Force highest LOD on models (less pop-in/simplification)
r_rootlod 0                 // Highest quality root LOD
cl_detailfade 400           // Keep background detail props visible longer
cl_detaildist 800           // Draw distance for detail props
mp_decals 300               // More bullet holes / decals visible at once

// --- Shadows ---
r_shadowrendertotexture 1
r_flashlightdepthtexture 1
mat_bumpmap 1                // Enable bump mapping on textures

// --- Water & reflections ---
r_waterforceexpensive 1     // Expensive (reflective) water where supported
r_waterforcereflectentities 1  // Reflect players/objects in water
r_waterdrawreflection 1
r_waterdrawrefraction 1

// --- Texture quality ---
mat_picmip 0                 // 0 = full resolution textures (negative = even sharper, GPU-heavy)
mat_forceaniso 16            // Max anisotropic filtering
mat_trilinear 1               // Trilinear filtering

// --- Antialiasing ---
mat_antialias 8               // 4x MSAA (try 8 if your GPU can handle it)
mat_aaquality 1
mat_postprocess_enable 1

// --- Color / lighting / effects ---
mat_hdr_level 2               // Full HDR
mat_colorcorrection 1
mat_specular 1
mat_phong 1
mat_motion_blur_enabled 1
mat_motion_blur_forward_enabled 1
mat_motion_blur_strength 0.5

// --- Particles / props ---
cl_particle_batch_mode 1
r_propsmaxdist 4000            // Max distance props render at
cl_ragdoll_forcefade 0         // Don't force-fade ragdolls early
g_ragdoll_fadespeed 0
g_ragdoll_lvfadespeed 0

// --- Misc visual polish ---
fov_desired 90
r_drawmodeldecals 1
cl_show_num_particle_systems 0

echo "High graphics config loaded."
