// reece's config //
//medic config

exec reset
exec binds
exec mybinds

// Crosshair switcher
exec crosshairswitcher/switcher; medic

// Teamchat ubercharge ready chat bind
bind MOUSE5 "say_team (READY TO UBERCHARGE); voicemenu 1 7"

// Move the heal target ui closer to crosshair
tf_hud_target_id_offset -50

// Auto-Crossbow Script
alias +quickbow "slot1; dropitem; +attack; spec_next"
alias -quickbow "slot2; -attack"

bind MOUSE4 +quickbow
