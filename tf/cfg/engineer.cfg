// reece's config //
//engineer config

exec reset
exec binds
exec mybinds

//crosshair switcher
exec crosshairswitcher/switcher; engineer

// Sentry
bind "mouse4" "build 2 0"
bind "mouse5" "destroy 2"


bind 4 "destroy 0; build 0" // Dispenser
bind e "destroy 1; build 1" // Teleporter entrance
bind r "destroy 3; build 3" // Teleporter exit

/////////////////////////////////////////////////////
// SolarLight's Eureka Effect Fast Teleport Script //
/////////////////////////////////////////////////////

bind b +teleport
alias +teleport slot3
alias -teleport Teleport_To_Spawn
alias Teleport_To_Spawn "eureka_teleport"
alias Teleport_To_Exit "eureka_teleport 1"

bind shift +toggleTeleport
alias +toggleTeleport "alias -teleport Teleport_To_Exit"
alias -toggleTeleport "alias -teleport Teleport_To_Spawn"

/////////////////////////////////////////////////////
