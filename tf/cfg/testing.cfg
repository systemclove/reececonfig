// reece's config //
// Enable cheats
sv_cheats 1

// Infinite ammo
sv_infinite_ammo 1

// Instant respawn times
mp_respawnwavetime 0

// Infinite round time
mp_roundtime 999
mp_timelimit 0

// Spawn bots (2 on each team)
tf_bot_add 2 red
tf_bot_add 2 blue

// Make bots passive (no attacking)
tf_bot_melee_only 1
tf_bot_keep_class_after_death 1
tf_bot_dont_attack 1

// Restart match
mp_restartgame 1
